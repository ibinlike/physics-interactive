<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理互动演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    color: #e0e0e0;
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    min-height: 100vh;
    padding: 0 20px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 0 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 8px;
  }
  header p {
    font-size: 15px;
    color: #8892b0;
    line-height: 1.6;
  }

  .section-title {
    font-size: 13px;
    color: #64ffda;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e293b;
  }

  .demo-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .demo-card {
    display: block;
    background: #1a1a2e;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    padding: 20px 24px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .demo-card:hover {
    border-color: #64ffda;
    background: linear-gradient(135deg, rgba(100,255,218,0.04), rgba(100,255,218,0.01));
  }

  .demo-card .title {
    font-size: 17px;
    font-weight: 600;
    color: #f8fafc;
    margin-bottom: 6px;
  }
  .demo-card .desc {
    font-size: 14px;
    color: #8892b0;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .demo-card .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .demo-card .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(100,255,218,0.08);
    color: #64ffda;
  }
  .demo-card .tag.orange {
    background: rgba(255,159,67,0.08);
    color: #ff9f43;
  }
  .demo-card .tag.blue {
    background: rgba(74,144,217,0.08);
    color: #4a90d9;
  }

  .coming-soon {
    text-align: center;
    padding: 32px;
    color: #5a6a8a;
    font-size: 14px;
    border: 1px dashed #2a3a5c;
    border-radius: 8px;
    margin-top: 12px;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid #1e293b;
    font-size: 12px;
    color: #5a6a8a;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>物理互动演示</h1>
    <p>高中物理题目的交互式模拟 — 拖动参数，观察物理量实时变化</p>
  </header>

  <div class="section-title">力学</div>

  <div class="demo-list">
    <a class="demo-card" href="demos/ban-yuan-gui-dao/">
      <div class="title">半圆轨道碰撞</div>
      <div class="desc">
        小球A沿光滑半圆轨道上升，在顶部与悬挂的小球B发生完全非弹性碰撞。
        拖动球A观察能量守恒过程，到达顶部触发碰撞计算。
      </div>
      <div class="tags">
        <span class="tag">能量守恒</span>
        <span class="tag">动量守恒</span>
        <span class="tag orange">碰撞</span>
        <span class="tag blue">圆周运动</span>
      </div>
    </a>

    <div class="coming-soon">更多题目即将添加...</div>
  </div>

  <footer>
    从考试题截图到互动模拟 — 让物理看得见、摸得着
  </footer>
</div>

</body>
</html>
